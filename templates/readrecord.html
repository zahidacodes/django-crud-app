{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-sm-4">
     <h4 class="text-center alert alert-info">Add New Students</h4>
     <form action="" method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <input type="submit" class = "btn btn-success">
     </form>
    </div>
    <div class="col-sm-8">
        <h4 class = "text-center alert alert-info">Show Student Information</h4>
        {% if data %}
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in data %}
                <tr>
                    <td>{{i.name}}</td>
                    <td>{{i.email}}</td>
                    <td>{{i.password}}</td>
                    <td>
                        <a href="{% url 'modifys' i.id %}" class = "btn btn-warning">Edit</a>
                       <form action="{% url 'del' i.id %}" method = "POST" class="d-inline">
                        {% csrf_token %}
                        <input type="submit" value = "delete" class = "btn btn-danger">
                       </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </div>
</div>
{% endblock content %}
